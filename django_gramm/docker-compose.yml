services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./pg_data:/var/lib/postgresql/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    command: sh -c "npm run build && ls -la /app/static/frontend"
    volumes:
      - ./static/frontend:/app/static/frontend
    env_file:
      - .env

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn django_gramm.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
      - ./static/frontend:/app/static/frontend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      frontend:
        condition: service_completed_successfully


